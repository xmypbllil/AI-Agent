name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Compile
        run: python -m compileall agent computer runtime memory vision ui tests
      - name: Test
        run: python -m pytest
